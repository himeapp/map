<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>himemap — 경로 이탈 재탐색</title>
<style>
  :root{
    --bg:#f2f2f7; --card:#fff; --sec:#8a8a8e; --label:#1c1c1e;
    --blue:#0a84ff; --green:#34c759; --orange:#ff9f0a; --purple:#bf5af2;
    --red:#ff3b30; --line:#e9e9ed; --chip:#eef0f3;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased;}
  body{
    margin:0; padding:50px 0 70px;
    font-family:-apple-system,"SF Pro Text","Apple SD Gothic Neo","Pretendard",sans-serif;
    background:radial-gradient(circle at 50% 0%,#26262b,#141417 60%); color:#fff; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
  }
  h1{font-size:24px; font-weight:700; margin:0 0 6px; letter-spacing:-.4px;}
  .sub{color:#9a9aa2; font-size:14px; margin:0 0 40px; letter-spacing:-.1px;}

  .phone{
    width:390px; height:620px; background:var(--bg); border-radius:54px;
    position:relative; overflow:hidden; border:12px solid #0b0b0d;
    box-shadow:0 30px 70px rgba(0,0,0,.55);
  }
  .island{position:absolute; top:13px; left:50%; transform:translateX(-50%);
    width:110px; height:32px; background:#000; border-radius:18px; z-index:60;}
  .status{position:absolute; top:0; left:0; right:0; height:56px; z-index:55;
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 32px 0; color:var(--label);}
  .status .time{font-size:16px; font-weight:600; letter-spacing:.2px; padding-left:8px;}
  .status .ind{display:flex; align-items:center; gap:7px;}
  .screen{position:absolute; inset:0; padding-top:56px; display:flex; flex-direction:column;}

  /* ── 지도 영역 (흐릿하게 뒤에) ── */
  .map-bg{
    position:absolute; inset:0;
    background:
      linear-gradient(135deg,#e8ecef 25%,#dde3e8 25%,#dde3e8 50%,#e8ecef 50%,#e8ecef 75%,#dde3e8 75%);
    background-size:28px 28px;
    opacity:.55;
  }
  .map-road{
    position:absolute;
    background:#c8cdd4;
  }

  /* ── 시트 (바텀 시트처럼) ── */
  .sheet{
    position:absolute; bottom:0; left:0; right:0;
    background:var(--card);
    border-radius:24px 24px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,.12);
    padding:0 0 32px;
    z-index:30;
  }
  .sheet-handle{
    width:36px; height:4px; background:#d1d1d6; border-radius:2px;
    margin:12px auto 0;
  }

  /* ── 이탈 알림 배너 ── */
  .alert-banner{
    margin:16px 16px 0;
    background:rgba(255,59,48,.08);
    border:1.5px solid rgba(255,59,48,.22);
    border-radius:16px;
    padding:13px 15px;
    display:flex; align-items:center; gap:11px;
  }
  .alert-icon{
    width:36px; height:36px; border-radius:50%;
    background:var(--red); flex:none;
    display:flex; align-items:center; justify-content:center;
  }
  .alert-text .t1{font-size:15px; font-weight:700; color:var(--red); letter-spacing:-.2px;}
  .alert-text .t2{font-size:12.5px; color:var(--sec); margin-top:2px;}

  /* ── OD 카드 ── */
  .od-card{
    margin:14px 16px 0;
    background:#f7f7fa;
    border-radius:18px;
    padding:4px 0;
    overflow:hidden;
  }
  .od-row{
    display:flex; align-items:center; gap:12px;
    padding:13px 16px;
  }
  .od-dot{
    width:10px; height:10px; border-radius:50%; flex:none;
  }
  .od-dot.from{background:var(--blue);}
  .od-dot.to{background:var(--purple);}
  .od-label{font-size:11.5px; color:var(--sec); width:28px; flex:none;}
  .od-name{font-size:16px; font-weight:700; color:var(--label); flex:1; letter-spacing:-.2px;}
  .od-badge{
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; flex:none;
  }
  .od-badge.new{background:rgba(10,132,255,.12); color:var(--blue);}
  .od-badge.keep{background:rgba(191,90,242,.12); color:var(--purple);}
  .od-divider{height:1px; background:var(--line); margin:0 16px 0 54px;}

  .od-note{
    padding:10px 16px 14px;
    font-size:12px; color:var(--sec); line-height:1.5;
  }
  .od-note b{color:var(--blue); font-weight:600;}

  /* ── 버튼 ── */
  .btn-wrap{padding:0 16px; margin-top:4px; display:flex; flex-direction:column; gap:10px;}
  .btn-reroute{
    width:100%; padding:16px;
    background:var(--blue); color:#fff;
    border:none; border-radius:16px;
    font-size:17px; font-weight:700; letter-spacing:-.3px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-cancel{
    width:100%; padding:14px;
    background:transparent; color:var(--sec);
    border:none; border-radius:16px;
    font-size:15px; font-weight:600; letter-spacing:-.2px;
    cursor:pointer;
  }

  /* ── 지도 핀 ── */
  .map-pin{
    position:absolute; z-index:20;
    display:flex; flex-direction:column; align-items:center;
  }
  .map-pin .pin-dot{
    width:14px; height:14px; border-radius:50%;
    border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .map-pin .pin-label{
    background:#1c1c1e; color:#fff;
    font-size:10.5px; font-weight:700;
    padding:3px 8px; border-radius:20px;
    margin-top:4px; white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }

  /* 이탈 경로 점선 */
  .map-dashed{
    position:absolute; z-index:18;
    border-top:2.5px dashed rgba(255,59,48,.55);
    transform-origin:0 50%;
  }
</style>
</head>
<body>

<h1>himemap</h1>
<p class="sub">경로 이탈 → 현위치 기준 재탐색</p>

<div class="phone">
  <div class="island"></div>
  <div class="status">
    <span class="time">9:41</span>
    <div class="ind">
      <!-- signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="6" width="3" height="6" rx="1" fill="#1c1c1e"/>
        <rect x="4.5" y="4" width="3" height="8" rx="1" fill="#1c1c1e"/>
        <rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="#1c1c1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1c1c1e" opacity=".3"/>
      </svg>
      <!-- wifi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#1c1c1e">
        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.8a6.3 6.3 0 0 1 4.5 1.9l-1.4 1.4a4.3 4.3 0 0 0-6.2 0L3.5 7.6A6.3 6.3 0 0 1 8 5.7zm0-3.8a10 10 0 0 1 7.1 2.9L13.7 6.2A8 8 0 0 0 2.3 6.2L.9 4.8A10 10 0 0 1 8 1.9z"/>
      </svg>
      <!-- battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="#1c1c1e" stroke-opacity=".35"/>
        <rect x="2" y="2" width="15" height="8" rx="2" fill="#1c1c1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1c1c1e" opacity=".4"/>
      </svg>
    </div>
  </div>

  <div class="screen">
    <!-- 지도 배경 -->
    <div style="position:absolute;inset:0;z-index:0;">
      <div class="map-bg"></div>
      <!-- 도로 흉내 -->
      <div class="map-road" style="top:140px;left:0;right:0;height:18px;opacity:.4;"></div>
      <div class="map-road" style="top:0;bottom:300px;left:155px;width:14px;opacity:.3;"></div>
      <div class="map-road" style="top:200px;bottom:280px;left:240px;width:10px;opacity:.25;"></div>

      <!-- 이탈 점선 경로 (현위치 → 원래 경로 방향) -->
      <div class="map-dashed" style="top:255px;left:170px;width:90px;transform:rotate(15deg);"></div>

      <!-- 현위치 핀 (파랑, GPS 점) -->
      <div class="map-pin" style="top:230px;left:155px;">
        <div class="pin-dot" style="background:var(--blue);"></div>
        <div class="pin-label">현재 위치</div>
      </div>

      <!-- 목적지 핀 (보라) -->
      <div class="map-pin" style="top:110px;left:218px;">
        <div style="width:28px;height:28px;background:var(--purple);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);"></div>
        <div class="pin-label" style="margin-top:6px;">성수역 2번 출구</div>
      </div>
    </div>

    <!-- 바텀 시트 -->
    <div class="sheet">
      <div class="sheet-handle"></div>

      <!-- OD 카드 -->
      <div class="od-card">
        <div class="od-row">
          <div class="od-dot from"></div>
          <span class="od-label" style="font-size:11px;color:var(--sec);">출발</span>
          <span class="od-name" style="font-size:14px;font-weight:600;color:#555;">뚝섬역 1번 출구 부근</span>
          <span class="od-badge new">현위치</span>
        </div>
        <div class="od-divider"></div>
        <div class="od-row">
          <div class="od-dot to"></div>
          <span class="od-label" style="font-size:11px;color:var(--sec);">도착</span>
          <span class="od-name">성수역 2번 출구</span>
          <span class="od-badge keep">그대로</span>
        </div>
      </div>

      <!-- 버튼 -->
      <div class="btn-wrap">
        <button class="btn-reroute">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2v3.5L12.5 2 9 2z" fill="#fff"/>
            <path d="M9 2C5.13 2 2 5.13 2 9s3.13 7 7 7 7-3.13 7-7" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          지금 위치에서 다시 탐색
        </button>
        <button class="btn-cancel">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline;vertical-align:middle;margin-right:4px;">
            <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          뒤로 가기
        </button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
