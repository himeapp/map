name: himemap
options:
  bundleIdPrefix: com.himemap
  deploymentTarget:
    iOS: "16.1"
  createIntermediateGroups: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  himemap:
    type: application
    platform: iOS
    dependencies:
      - target: himemapWidget
    sources:
      - path: .
        includes:
          - "*.swift"
      - path: Assets.xcassets
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: himemap
        UILaunchScreen: {}
        # --- Live Activity (다이내믹 아일랜드 / 잠금화면) ---
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # --- API 키: 빌드 시 Secrets.xcconfig 값으로 $(...) 치환됨 ---
        KAKAO_API_KEY: $(KAKAO_API_KEY)
        ODSAY_API_KEY: $(ODSAY_API_KEY)
        DATA_GO_KR_KEY: $(DATA_GO_KR_KEY)
        SEOUL_OPEN_API_KEY: $(SEOUL_OPEN_API_KEY)
        # --- 위치 권한 ---
        NSLocationWhenInUseUsageDescription: 현재 위치를 출발지로 사용하기 위해 필요합니다
        NSLocationAlwaysAndWhenInUseUsageDescription: 경로 안내 중 위치 추적에 사용됩니다
        # --- 간판 읽기(방향 잡기) 권한 ---
        NSMicrophoneUsageDescription: 정면 간판을 소리내어 읽으면 내가 보는 방향을 잡아드려요
        NSSpeechRecognitionUsageDescription: 읽은 간판 이름을 글자로 바꿔 위치·방향을 계산합니다
        # --- 백그라운드 위치 갱신 (잠금화면/백그라운드에서도 도착 알림) ---
        UIBackgroundModes:
          - location
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.himemap.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  # 위젯 익스텐션 — Live Activity(다이내믹 아일랜드 / 잠금화면) 전용
  himemapWidget:
    type: app-extension
    platform: iOS
    sources:
      # 앱과 공유하는 Live Activity 속성 모델
      - TransitActivityAttributes.swift
      - path: Widget
    info:
      path: Generated/WidgetInfo.plist
      properties:
        CFBundleDisplayName: himemap
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.himemap.app.widget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
